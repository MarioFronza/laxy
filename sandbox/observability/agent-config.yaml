server:
  log_level: info
  http_listen_address: 0.0.0.0
  http_listen_port: 12345

metrics:
  global:
    scrape_interval: 15s
  configs:
    - name: default
      scrape_configs:
        - job_name: laxy-app
          static_configs:
            - targets: ['laxy-app:8080']

logs:
  configs:
    - name: container-logs
      clients:
        - url: http://loki:3100/loki/api/v1/push
      positions:
        filename: /tmp/positions.yaml
      scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: [__meta_docker_container_name]
              regex: "/(.+)"
              target_label: container
            - source_labels: [__meta_docker_container_log_stream]
              target_label: stream

traces:
  configs:
    - name: default
      receivers:
        otlp:
          protocols:
            grpc:
            http:
      remote_write:
        - endpoint: tempo:4317
